# ── Pytest Configuration ──────────────────────────────────────────────────────
# Tells pytest where to find the backend code when running tests.
# asyncio_mode=auto means every async test function runs automatically
# in an event loop without needing @pytest.mark.asyncio on every single one.
# ─────────────────────────────────────────────────────────────────────────────

[pytest]
asyncio_mode = auto
pythonpath = .
testpaths = tests